<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#F9FAFB" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F9FAFB" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#F9FAFB" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BBTalk" />
    <meta name="description" content="ChewyBBTalk - 一个简洁的微博客/碑碑念应用" />
    
    <link rel="icon" type="image/png" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon-precomposed" href="/apple-touch-icon.png" />
    
    <title>ChewyBBTalk</title>
  </head>
  <body>
    <div id="root">
      <!-- 首屏 loading 占位，React 挂载后自动替换 -->
      <div id="app-loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#F9FAFB;gap:16px;">
        <div style="width:48px;height:48px;border:3px solid #E5E7EB;border-top-color:#3B82F6;border-radius:50%;animation:spin .8s linear infinite;"></div>
        <div style="color:#9CA3AF;font-size:14px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">加载中...</div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
