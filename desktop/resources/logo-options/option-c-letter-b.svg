           M220 170 v55 h35 c25 0 40 -12 40 -28 c0 -16 -15 -27 -40 -27 z
           M220 265 v60 h40 c28 0 45 -13 45 -30 c0 -17 -17 -30 -45 -30 z"
        fill="white" opacity="0.95"/>
  <!-- 小气泡点缀 -->
  <circle cx="370" cy="150" r="20" fill="white" opacity="0.3"/>
  <circle cx="395" cy="185" r="12" fill="white" opacity="0.2"/>
