      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <!-- 圆形背景 -->
  <circle cx="256" cy="256" r="240" fill="url(#bgC)"/>
  <!-- 字母 B — 粗圆体风格 -->
