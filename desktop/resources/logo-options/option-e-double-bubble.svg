<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- 方案E: 双气泡重叠（对话/碎碎念感） -->
  <defs>
    <linearGradient id="bgE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <!-- 圆角方形背景 -->
  <rect x="16" y="16" width="480" height="480" rx="110" fill="url(#bgE)"/>
  <!-- 后面的大气泡 -->
  <ellipse cx="270" cy="230" rx="130" ry="110" fill="white" opacity="0.35"/>
  <!-- 前面的气泡 -->
  <ellipse cx="240" cy="250" rx="120" ry="100" fill="white" opacity="0.92"/>
  <!-- 气泡尾巴 -->
  <circle cx="155" cy="345" r="22" fill="white" opacity="0.92"/>
  <circle cx="125" cy="380" r="13" fill="white" opacity="0.92"/>
  <!-- BB 文字 -->
  <text x="195" y="275" font-family="-apple-system, sans-serif" font-size="80" font-weight="800" fill="#3B82F6" letter-spacing="-3">BB</text>
</svg>
