appId: com.chewybbtalk.desktop
productName: ChewyBBTalk
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - "!out/types-*"

extraResources:
  - from: resources/icon.png
    to: icon.png

publish:
  provider: github
  owner: cone387
  repo: ChewyBBTalk

mac:
  category: public.app-category.utilities
  icon: resources/icon.png
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal

dmg:
  sign: false

win:
  icon: resources/icon.png
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
