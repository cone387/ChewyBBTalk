<svg xmlns="http://www.w3.org/2000/svg" width="1284" height="2778" viewBox="0 0 1284 2778">
  <!-- 白色背景 -->
  <rect width="1284" height="2778" fill="#FFFFFF"/>
  
  <!-- 居中的小图标 -->
  <g transform="translate(442, 1089) scale(0.4)">
    <defs>
      <linearGradient id="sbg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#E84040"/>
        <stop offset="100%" style="stop-color:#C62828"/>
      </linearGradient>
    </defs>
    <!-- 图标背景圆角方块 -->
    <rect width="1024" height="1024" rx="220" ry="220" fill="url(#sbg)"/>
    <!-- 主气泡 -->
    <rect x="220" y="300" width="440" height="320" rx="48" ry="48" fill="white" opacity="0.95"/>
    <polygon points="280,620 240,700 360,620" fill="white" opacity="0.95"/>
    <!-- 三个点 -->
    <circle cx="350" cy="460" r="28" fill="#E84040"/>
    <circle cx="440" cy="460" r="28" fill="#E84040"/>
    <circle cx="530" cy="460" r="28" fill="#E84040"/>
    <!-- 次气泡 -->
    <rect x="520" y="180" width="300" height="200" rx="40" ry="40" fill="white" opacity="0.7"/>
    <rect x="570" y="250" width="200" height="14" rx="7" fill="#E84040" opacity="0.5"/>
    <rect x="570" y="290" width="150" height="14" rx="7" fill="#E84040" opacity="0.35"/>
    <rect x="570" y="330" width="100" height="14" rx="7" fill="#E84040" opacity="0.2"/>
  </g>
  
  <!-- App 名称 -->
  <text x="642" y="1550" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="48" font-weight="600" fill="#374151">ChewyBBTalk</text>
  <text x="642" y="1600" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" fill="#9CA3AF">记录生活的点滴</text>
</svg>
