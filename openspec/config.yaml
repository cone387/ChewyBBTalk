schema: spec-driven

# 项目上下文 — 该内容会注入到 AI 创建工件时的提示词中
context: |
  # ChewyBBTalk — 个人碎碎念系统

  ## 项目定位
  现代化的个人微博/碎碎念系统，自托管，单用户为主，支持多端访问（Web、PWA、iOS、Android）。

  ## 技术栈
  - 后端: Python 3.13 + Django 5.2 + DRF + drf-spectacular + JWT (SimpleJWT)
  - 数据库: SQLite（默认）/ PostgreSQL / MySQL（通过 DATABASE_URL 切换）
  - 附件存储: chewy-attachment（本地）/ S3 兼容（可在运行时切换）
  - Web 前端: React 18 + Vite 5 + Redux Toolkit + Tailwind CSS + PWA
  - 移动端 (mobile/): Expo SDK 54 + React Native 0.81 + React Navigation + Redux Toolkit；
    通过 react-native-web 同时支持 Web 端
  - 部署: Docker 单容器（推荐）/ docker-compose / 本地开发

  ## 仓库结构
  - backend/    — Django 后端，应用 bbtalk 内含模型、视图、序列化器、URL
  - frontend/   — Web 前端（Vite + React，旧版本，仍维护）
  - mobile/     — Expo 跨端应用（iOS / Android / Web，主推方向）
  - openspec/   — 规范驱动开发文档
  - data/       — 持久化数据卷（数据库、媒体、静态文件）

  ## 核心领域概念
  - BBTalk（碎碎念）: 用户发布的内容条目，支持 Markdown、附件、标签、可见性、置顶、上下文（位置/天气/设备）
  - Tag（标签）: 用户级标签，唯一性按 (user, name) 维度，颜色随机生成可编辑
  - Comment（评论）: 对某条 BBTalk 的评论，仅作者可删除
  - Attachment（附件）: 基于 chewy-attachment，支持图片/音频/视频/文件，可切换本地或 S3 后端
  - User / Identity: 用户与认证身份分离设计，支持多种登录方式（密码、OAuth、邮箱验证码等）
  - UserStorageSettings: 用户级 S3 存储配置，可同时存在多个但只激活一个
  - 防偷窥（Privacy Lock）: 不活动超时后自动锁屏，需密码或生物识别解锁，支持 App 被 kill 后冷启动检查

  ## 编码约定
  - Commit 信息: 中文，格式 `type(scope): 描述`，常用 type: feat, fix, refactor, chore, docs
  - 文件 / 命名: 后端 snake_case，前端 / 移动端 camelCase + PascalCase 组件
  - 后端模型: 都继承 BaseModel（含 user/create_time/update_time），表名以 cb_ 前缀，业务主键用 22 位 base64 uid
  - API 路径: /api/v1/bbtalk/...，REST 风格 + 少量 RPC 风格端点
  - 认证: JWT 为主，Session 兼容；移动端使用 expo-secure-store 持久化 token
  - 跨平台 alert: 移动端 / Web 端的弹窗一律使用 mobile/src/utils/crossAlert.ts 提供的
    xAlert / xConfirm / xActionSheet，Web 端使用 iOS 风格自定义弹窗（见 webAlert.ts）

  ## 开发与部署命令
  - 后端开发:   cd backend && uv run dev  （启动 Django + 自动 migrate）
  - 后端迁移:   uv run makemigrations / uv run migrate
  - Web 前端:   cd frontend && npm run dev
  - 移动端:     cd mobile && npm start  （iOS: i / Android: a / Web: w）
  - 单容器部署: docker run -d -p 4010:4010 -v bbtalk_data:/app/data ghcr.io/cone387/chewybbtalk:latest

# 全局规则 — 所有工件都会遵守
rules:
  proposal:
    - 使用简体中文撰写
    - Why / What Changes / Capabilities / Impact 四段式
    - Impact 段必须列出具体改动的文件
  design:
    - 使用简体中文撰写
    - 必须包含「方案选型」与「未采纳方案及原因」
  spec:
    - 使用简体中文撰写需求描述与场景
    - Requirement 标题保持中文
    - Scenario 使用 WHEN / THEN（必要时 AND）句式
  tasks:
    - 使用简体中文
    - 任务粒度控制在 1-2 小时
    - 用 `[ ]` 复选框，便于实施时勾选
